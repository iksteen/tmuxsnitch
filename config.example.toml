# shellglass example config. Pass with `--config config.toml`.

# Base font: one family, or a fallback stack tried in order. With a list, the
# browser picks per character the first family that has the glyph — list a Nerd
# Font after your text font to get Kitty-style fallback with no symbol_map (see
# config.kitty.toml). symbol_map below is still available when you want the
# override glyphs SVG-scaled to lock to exactly one cell.
default_font = ["monospace", "Symbols Nerd Font Mono"]
font_size_px = 14.0
line_height  = 1.2

# Custom viewer page. The built-in page (used when unset) carries a CRT-effect
# toggle in its nav, off by default. The file is a full HTML document with
# three tokens filled at serve time: {{style}} (terminal CSS + @font-face),
# {{screen}} (the live #screen div — keep its id), {{script}} (the scripts
# that boot the live renderer). Everything else is yours.
# template = "my-viewer.html"

# Kitty-style symbol_map: map Unicode codepoint ranges to a specific font.
# First matching entry wins. Ranges accept "U+XXXX", "U+XXXX-U+YYYY", or "0xXXXX".
# Skip the E0B0-E0B3 arrows: the viewer draws those as canvas geometry that
# bleeds 1px past the cell edge to stay seamless with the segment bar. Mapping
# them to a font locks each glyph inside one cell (no bleed) and reintroduces a
# sub-pixel seam — the caret visibly detaches. Everything else (branch/padlock
# E0A0-E0AF, rounded/flame separators E0B4-E0D4) has no geometry, so map it.
[[symbol_map]]
ranges = ["U+E0A0-U+E0AF", "U+E0B4-U+E0D4"]  # Powerline extras (arrows are canvas-drawn)
font   = "Symbols Nerd Font"

[[symbol_map]]
ranges = ["U+F000-U+F2FF"]                    # Nerd Font private-use icons
font   = "Symbols Nerd Font"

# Font sources are optional: any family referenced above is auto-located via
# fontconfig and served to viewers. Add an entry only to override that — `path`
# serves a specific file, `system = "..."` sets the fontconfig name to match when
# it differs from the [fonts] key. `weight_boost = false` turns off the renderer's
# kitty-parity double-draw (which thickens anti-aliased midtones) for this family —
# use it for fonts whose own hinting already looks right and where the boost reads
# as too heavy. Default (omitted) is boosted, like every other font.
[fonts."Symbols Nerd Font"]
# path = "/usr/share/fonts/NerdFonts/SymbolsNerdFont-Regular.woff2"
system = "Symbols Nerd Font"
# weight_boost = false

# Fallback family used by the default_font stack above. This entry is optional:
# a referenced family is auto-located and served anyway. Add it only to override
# the lookup — `system` sets the name searched in the font database, or `path`
# forces a specific file (a missing path warns and is skipped). If nothing is
# found, the browser just falls through to the next stack entry (no error).
[fonts."Symbols Nerd Font Mono"]
system = "Symbols Nerd Font Mono"
