name: docker

# Build the image and push it to Docker Hub on a version tag. Multi-arch
# (amd64 + arm64) via buildx + QEMU — the arm64 layer builds under emulation, so
# it's slow (the aws-lc-rs compile), but needs no extra runners. Drop the arm64
# platform below if you only want amd64 and faster builds.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derive tags/labels from the git ref: vX.Y.Z -> X.Y.Z, X.Y, and `latest`.
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shellglass
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
