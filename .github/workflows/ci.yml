name: ci

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked
      # Feature subsets must keep compiling warning-free (roadmap item 13:
      # per-mode binaries). Check, not test — the full suite runs above.
      - name: check feature matrix
        env:
          RUSTFLAGS: -D warnings
        run: |
          for f in hub serve push ""; do
            echo "== features: ${f:-none}"
            cargo check --locked --no-default-features ${f:+--features $f}
          done

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: Check feature matrix
        env:
          RUSTFLAGS: -D warnings
        run: |
          cargo check --locked --no-default-features --features hub
          cargo check --locked --no-default-features --features serve
          cargo check --locked --no-default-features --features push
          cargo check --locked --no-default-features

  # The browser renderer is TypeScript, compiled to the committed viewer/dist/viewer.js
  # that build.rs bakes in. Type-check it, run its unit tests, and confirm the committed
  # build is regenerated from source (so it can never drift).
  viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: node --test

      - name: Committed build is fresh
        run: |
          npm run build
          git diff --exit-code dist/viewer.js
