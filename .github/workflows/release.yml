name: release

# On a version tag: build release binaries for each target, attach them to a GitHub
# Release, then assemble the multi-arch Docker image from those pre-built binaries.
# Linux aarch64 goes through `cross` (its container carries the cross toolchain +
# cmake that aws-lc-rs needs); everything else builds natively.
#
# The crate version is a placeholder in Cargo.toml (0.0.0-dev) and stamped here from
# the tag, so a release never needs a manual version-bump commit — just tag and push.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the release ONCE before the matrix fans out — a single job, so the
  # concurrent-create race that bit v0.8.1 (matrix jobs each creating the release,
  # exhausting retries on "already_exists") can't happen; the build jobs only upload.
  #
  # Fail HARD if a release for this tag already exists. A fresh tag push should never
  # find one — if it does, someone is re-releasing an existing version, which must be
  # a deliberate human action (delete the release, then re-tag), never a silent
  # overwrite. Keeping a human in the loop here is the point.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists — refusing to overwrite. Delete it and re-tag to re-release."
            exit 1
          fi
          # The tag annotation IS the release: subject → title, body → notes.
          # Re-fetch the tag first — actions/checkout peels annotated tags to
          # their commit, which would leave the annotation unreachable.
          git fetch --force origin "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME"
          title="$(git tag -l --format='%(contents:subject)' "$GITHUB_REF_NAME")"
          git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME" > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag \
            --title "$title" --notes-file /tmp/release-notes.md

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets are musl → fully static binaries (no libc dependency,
          # run anywhere incl. Alpine/distroless). cross's containers carry the
          # musl toolchain + cmake that aws-lc-rs/ring need; mimalloc replaces
          # musl's slow default allocator (see src/lib.rs).
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest, cross: true  }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, cross: true  }
          # Both macOS targets build on an arm64 runner; x86_64 cross-compiles
          # (avoids the retiring Intel macos-13 image, no Docker needed).
          - { target: x86_64-apple-darwin,       os: macos-14,      cross: false }
          - { target: aarch64-apple-darwin,      os: macos-14,      cross: false }
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: matrix.cross
        uses: taiki-e/install-action@cross

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      # Stamp the tag version (vX.Y.Z -> X.Y.Z) from the placeholder in Cargo.toml.
      # cargo set-version updates the manifest and Cargo.lock together, so --locked
      # still holds — and no manual version-bump commit is ever needed.
      - name: Stamp version
        # -p shellglass: the workspace includes the vendored vt100 crate, whose
        # pinned upstream version (0.16.2) must never be stamped — an unscoped
        # set-version tries to and aborts ("cannot downgrade").
        run: cargo set-version -p shellglass "${GITHUB_REF_NAME#v}"

      - name: Build
        run: |
          # `dist` = release + fat LTO (see Cargo.toml) — smaller shipped
          # binaries, dev builds keep the faster thin-LTO release profile.
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --profile dist --locked --target ${{ matrix.target }}
          else
            cargo build --profile dist --locked --target ${{ matrix.target }}
          fi

      - name: Package
        run: tar -czf shellglass-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/dist shellglass

      - uses: softprops/action-gh-release@v3
        with:
          files: shellglass-${{ matrix.target }}.tar.gz

      # Hand the raw binary to the docker job (Linux targets are the two image archs).
      # if-no-files-found: error — a wrong path here must fail THIS job, not
      # surface downstream as the docker job's "artifact not found" (which is
      # exactly how the release→dist profile move slipped through).
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/dist/shellglass
          if-no-files-found: error

  # Assemble the multi-arch image from the already-built Linux binaries — no second
  # Rust compile, so no slow aws-lc-rs build under arm64 QEMU. Only the tiny runtime
  # stage (apt + useradd) runs emulated.
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: bin-x86_64-unknown-linux-musl
          path: dist/amd64
      - uses: actions/download-artifact@v8
        with:
          name: bin-aarch64-unknown-linux-musl
          path: dist/arm64

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derive tags/labels from the git ref: vX.Y.Z -> X.Y.Z and X.Y (+ latest).
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shellglass
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
