name: release

# On a version tag: build release binaries for each target, attach them to a GitHub
# Release, then assemble the multi-arch Docker image from those pre-built binaries.
# Linux aarch64 goes through `cross` (its container carries the cross toolchain +
# cmake that aws-lc-rs needs); everything else builds natively.
#
# The crate version is a placeholder in Cargo.toml (0.0.0-dev) and stamped here from
# the tag, so a release never needs a manual version-bump commit — just tag and push.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the release ONCE before the matrix fans out — a single job, so the
  # concurrent-create race that bit v0.8.1 (matrix jobs each creating the release,
  # exhausting retries on "already_exists") can't happen; the build jobs only upload.
  #
  # Fail HARD if a release for this tag already exists. A fresh tag push should never
  # find one — if it does, someone is re-releasing an existing version, which must be
  # a deliberate human action (delete the release, then re-tag), never a silent
  # overwrite. Keeping a human in the loop here is the point.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists — refusing to overwrite. Delete it and re-tag to re-release."
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest, cross: true  }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, cross: true  }
          # Both macOS targets build on an arm64 runner; x86_64 cross-compiles
          # (avoids the retiring Intel macos-13 image, no Docker needed).
          - { target: x86_64-apple-darwin,       os: macos-14,      cross: false }
          - { target: aarch64-apple-darwin,      os: macos-14,      cross: false }
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: matrix.cross
        uses: taiki-e/install-action@cross

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      # Stamp the tag version (vX.Y.Z -> X.Y.Z) from the placeholder in Cargo.toml.
      # cargo set-version updates the manifest and Cargo.lock together, so --locked
      # still holds — and no manual version-bump commit is ever needed.
      - name: Stamp version
        run: cargo set-version "${GITHUB_REF_NAME#v}"

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        run: tar -czf shellglass-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release shellglass

      - uses: softprops/action-gh-release@v3
        with:
          files: shellglass-${{ matrix.target }}.tar.gz

      # Hand the raw binary to the docker job (Linux targets are the two image archs).
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shellglass

  # Assemble the multi-arch image from the already-built Linux binaries — no second
  # Rust compile, so no slow aws-lc-rs build under arm64 QEMU. Only the tiny runtime
  # stage (apt + useradd) runs emulated.
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-unknown-linux-gnu
          path: dist/amd64
      - uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-unknown-linux-gnu
          path: dist/arm64

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derive tags/labels from the git ref: vX.Y.Z -> X.Y.Z and X.Y (+ latest).
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shellglass
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
