# Replicates kitty's zero-config powerline/Nerd-Font rendering.
#
# kitty (>=0.36) has no font config of its own here: it uses the system
# `monospace` (Noto Sans Mono on this box) and auto-falls-back to a bundled
# Symbols Nerd Font Mono for symbol glyphs. We reproduce that the same way kitty
# does — a font fallback stack, no codepoint ranges: list the Nerd Font after the
# text font and the browser picks it, per character, for any glyph the text font
# lacks (every Nerd-Font PUA icon).
default_font = ["Noto Sans Mono", "Symbols Nerd Font Mono"]
font_size_px = 14.0
line_height  = 1.2

# Embed kitty's own bundled file so the page is self-contained and pixel-matches.
[fonts."Symbols Nerd Font Mono"]
path = "/usr/lib/kitty/fonts/SymbolsNerdFontMono-Regular.ttf"

# Note: fallback selects the glyph but renders it at the font's own advance.
# Symbols Nerd Font *Mono* is cell-designed, so powerline separators tile fine.
# If a non-mono Nerd Font leaves seams between separators, switch that font to a
# `[[symbol_map]]` range instead — those glyphs get SVG-scaled to lock each to
# exactly one cell (see config.example.toml).
