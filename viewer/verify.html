<!doctype html>
<!-- Canvas verification page: renders one static representative frame through
     the production apply() path (canvas picture over ghost text). verify.py
     screenshots it for terminal-semantics checks, plus one green/red
     self-check scenario per ?mode. -->
<html><head><meta charset="utf-8"><style>
  html,body { margin:0; }
  #screen { font-family:monospace; font-size:14px; --lh:17px; line-height:var(--lh);
            color:#d0d0d0; background:#000; }
  .screen { position:relative; white-space:pre; overflow:hidden; }
  .row { position:relative; height:var(--lh); contain:layout style; }
</style></head><body>
<div id="screen"></div>
<script type="module">
import { setConfig, apply, benchInit, benchFlush, benchRedraw, benchCursorStep, benchBlinkPhase, benchWeight, benchRuns, benchPinch, weightBoost } from "./viewer.js";

const PARAMS = new URLSearchParams(location.search);
const MODE = PARAMS.get("mode") ?? "static";
const ZOOM = parseFloat(PARAMS.get("zoom") ?? "1");
if (ZOOM !== 1) document.getElementById("screen").style.zoom = String(ZOOM);
setConfig({ defFg: "#d0d0d0", defBg: "#000000", fillFont: "monospace", sym: [] });
benchInit(document.getElementById("screen"));

// One static frame: text in several styles (baseline check rows) and a row of
// fill glyphs (stretch/coverage check). 60x12.
const COLS = 60, ROWS = 17;
const pad = (s) => s + " ".repeat(Math.max(0, COLS - s.length));
const d = [];
d.push([[pad("plain text row Mgjq 0123456789 the quick brown fox")]]);
d.push([[pad("bold row Mgjq HAMBURGEFONTS")], [[0, COLS, { b: 1 }]]]);
d.push([[pad("colored row Mgjq xxxxxxxxxxxxxxxx")], [[0, COLS, { f: 2 }]]]);
d.push([[pad("inverse Mgjq")], [[0, 12, { n: 1 }]]]);
// fill glyphs: eighth-blocks + shades (stretch targets)
d.push([[pad("▁▂▃▄▅▆▇█ ░▒▓ ▏▎▍▌▋▊▉")]]);
d.push([[pad("underline row Mgjq")], [[0, 18, { u: 1 }]]]);
d.push([[pad("double underline Mgjq")], [[0, 21, { u: 2 }]]]);
d.push([[pad("curly colored Mgjq")], [[0, 18, { u: 3, k: 1 }]]]);
d.push([[pad("dotted Mgjq / dashed Mgjq")], [[0, 11, { u: 4 }], [14, 11, { u: 5 }]]]);
d.push([[pad("strikethrough Mgjq")], [[0, 18, { s: 1 }]]]);
// contiguous bg run (device-pixel seam check: verify.py scans this band)
d.push([[pad("bg run seam probe")], [[0, 50, { g: 4 }]]]);
// concealed text (SGR 8): glyphs hidden in BOTH modes — verify.py asserts an
// ink-free band; the characters still ride the wire (ghost/copy keeps them)
d.push([[pad("hidden secret Mgjq")], [[0, 18, { o: 1 }]]]);
for (let i = d.length; i < ROWS; i++) d.push([[pad(`row ${i} Mgjq baseline probe`)]]);

apply({ v: 4 });
apply({ d, w: COLS, h: ROWS, p: [10, 4], q: 5 }); // bar cursor on row 10
benchFlush(); // synchronous paint — safe to screenshot at onload

// ?mode=links: OSC 8 self-check — synthetic hover over a linked
// cell must set cursor:pointer + draw underline ink on the canvas; hover off
// a link must clear both. Paints the body green/red so verify.py can assert
// from the screenshot alone.
if (MODE === "links") {
  const d2 = [];
  d2.push([[pad("click https://example.com here")], [[6, 19, { a: 1 }]]]);
  for (let i = d2.length; i < ROWS; i++) d2.push([[pad(`row ${i}`)]]);
  apply({ d: d2, w: COLS, h: ROWS, y: { 1: "https://example.com" } });
  benchFlush();
  const scr = document.querySelector("#screen .screen");
  const canvas = document.querySelector("#screen canvas");
  const cw = scr.getBoundingClientRect().width / COLS;
  const hover = (col, row) => {
    const r = scr.getBoundingClientRect();
    scr.dispatchEvent(new MouseEvent("mousemove", {
      bubbles: true, clientX: r.left + (col + 0.5) * cw, clientY: r.top + (row + 0.5) * 17,
    }));
  };
  const band = () => { // ink in the hovered cell row's underline band
    const g = canvas.getContext("2d");
    const px = g.getImageData(0, 0, canvas.width, Math.round(17 * devicePixelRatio)).data;
    let ink = 0;
    for (let i = 3; i < px.length; i += 4) ink += px[i];
    return ink;
  };
  const before = band();
  hover(10, 0); // inside the link
  const linkCursor = getComputedStyle(scr).cursor;
  const after = band();
  hover(40, 3); // plain cell
  const plainCursor = getComputedStyle(scr).cursor;
  const cleared = band();
  const pass = linkCursor === "pointer" && plainCursor !== "pointer"
    && after > before && cleared < after;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=image: inline-image self-check — the placement references a content
// address, the <img> fetches it from the page-relative images/<k> (verify.py
// serves a red 8×8 PNG there), stays hidden (stylesheet rule), and the image
// draws on the canvas UNDER the glyphs: a text cell over the image shows its
// painted bg (text wins, like a real cell terminal), an untouched cell shows
// the image. After load the element swaps its src to an embedded data: URL so
// a COPIED fragment pastes a real picture even after the session dies.
// Green/red convention.
if (MODE === "image") {
  const d3 = [];
  for (let i = 0; i < ROWS; i++) d3.push([[pad(i === 2 ? "    OVERWRITE" : "")]]);
  apply({ d: d3, w: COLS, h: ROWS,
          i: [{ r: 1, c: 2, w: 10, h: 4, k: "ab".repeat(32) }] });
  benchFlush();
  const img = document.querySelector("img.inline-img");
  const fetched = img.getAttribute("src") === `images/${"ab".repeat(32)}`;
  // Assert from the img's own load events: the viewer's listener (attached
  // first) swaps src to data: on the network load; the swap starts a second
  // (data:) load the WINDOW load must also wait for — so asserting on the
  // completed data: load runs before the screenshot, race-free.
  const swapped = () => new Promise((res) => {
    const check = () => {
      if (img.src.startsWith("data:") && img.complete) res(null);
    };
    img.addEventListener("load", check);
    check(); // in case both loads already finished
  });
  swapped().then(() => {
    benchRedraw(); // deterministic: don't race the async image-load repaint
    const scr = document.querySelector("#screen .screen");
    const canvas = document.querySelector("#screen canvas");
    const g = canvas.getContext("2d");
    const cw = (scr.getBoundingClientRect().width / COLS) * devicePixelRatio;
    const lh = 17 * devicePixelRatio;
    const px = (x, y) => g.getImageData(Math.round(x), Math.round(y), 1, 1).data;
    const imgPx = px(3.5 * cw, 3.5 * lh); // row 3 col 3: image, no text
    const txtPx = px(5 * cw + 1, 2 * lh + 1); // row 2 col 5: text cell corner → bg
    const hidden = getComputedStyle(img).visibility === "hidden";
    // the inline style must carry NOTHING but --sg-* custom properties —
    // real layout properties ride the copied fragment and squish/hide the
    // pasted image in targets that half-parse ch/var() (LibreOffice)
    const noInline = [...img.style].every((p) => p.startsWith("--sg-"));
    // and the page must still lay it out (through the injected rules)
    const cs = getComputedStyle(img);
    const laidOut = cs.position === "absolute" && cs.objectFit === "contain";
    // copy semantics: the image sits in document order between the rows it
    // spans (so a selection over them carries it), and the copied fragment's
    // src is the EMBEDDED bitmap, not the session-relative URL
    const rows = document.querySelectorAll("#screen .row");
    const range = document.createRange();
    range.setStart(rows[1].firstChild, 0);
    range.setEnd(rows[5].firstChild, 3);
    const copiedImg = range.cloneContents().querySelector("img.inline-img");
    const copied = copiedImg !== null && copiedImg.src.startsWith("data:image/png");
    const pass = fetched && hidden && noInline && laidOut && copied
      && imgPx[0] > 180 && imgPx[1] < 60 // red image under blank cells
      && txtPx[0] < 60 && txtPx[1] < 60 && txtPx[2] < 60; // painted bg under text
    document.getElementById("screen").style.display = "none";
    // Failure paints the flag bits into the blue channel for the screenshot.
    const bits = (fetched ? 1 : 0) + (hidden ? 2 : 0) + (noInline ? 4 : 0)
      + (laidOut ? 8 : 0) + (copied ? 16 : 0)
      + (imgPx[0] > 180 && imgPx[1] < 60 ? 32 : 0)
      + (txtPx[0] < 60 && txtPx[1] < 60 && txtPx[2] < 60 ? 64 : 0);
    document.body.style.background = pass ? "#00ff00" : `rgb(255, 0, ${bits})`;
    document.title = "verified-ready";
  });
}

// ?mode=cursor (with &cursor=smooth): smooth cursor travel self-check. After
// a cursor move the static cursor is suppressed (the row repaint leaves no
// block at the target); the traveling rect lands on the target within ~80ms
// and the static cursor is restored there. Green/red convention.
if (MODE === "cursor") {
  const d4 = [];
  for (let i = 0; i < ROWS; i++) d4.push([[pad("")]]);
  apply({ d: d4, w: COLS, h: ROWS, p: [5, 5] });
  benchFlush();
  const scr = document.querySelector("#screen .screen");
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const cw = (scr.getBoundingClientRect().width / COLS) * devicePixelRatio;
  const lh = 17 * devicePixelRatio;
  const rectCol = () => { // centroid column of bright ink in row 5's band
    const px = g.getImageData(0, Math.round(5 * lh), canvas.width, Math.round(lh)).data;
    let sum = 0, n = 0;
    for (let i = 0; i < px.length; i += 4) {
      if (px[i + 3] > 100 && px[i] + px[i + 1] + px[i + 2] > 300) {
        sum += (i / 4) % canvas.width; n++;
      }
    }
    return n ? sum / n / cw : -1;
  };
  const spin = (ms) => { const t = performance.now(); while (performance.now() - t < ms); };
  const start = rectCol(); // static block at col 5 (center ~5.5)
  apply({ p: [5, 40] });
  spin(50); // let the shaper interval pass so the next flush paints now
  benchFlush(); // starts the travel animation, suppresses the static cursor
  const after = rectCol(); // suppressed: no block anywhere yet
  spin(30); // ~mid-travel
  benchCursorStep(); // draw the traveling rect at the interpolated position
  const mid = rectCol();
  spin(60); // past the 80ms travel budget
  benchCursorStep(); // lands: static cursor restored at the target
  const end = rectCol();
  const pass = Math.abs(start - 5.5) < 1 && after === -1
    && mid > 7 && mid < 39 && Math.abs(end - 40.5) < 1;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=bleed: the terminal box model — with a line height TIGHTER than the
// font's bounding box (14px lh under a 14px font), the canvas font shrinks to
// fit the band: descenders (gjqy) and a double underline's low bar stay
// VISIBLE and INSIDE their own row box (nothing hangs into the row below,
// nothing is amputated). Green/red convention.
if (MODE === "bleed") {
  document.getElementById("screen").style.setProperty("--lh", "14px");
  const d5 = [];
  for (let i = 0; i < ROWS; i++) d5.push([[pad("")]]);
  d5[2] = [[pad("gjqy pgqy Mgjq")]];
  d5[5] = [[pad("double underline gjq")], [[0, 20, { u: 2 }]]];
  apply({ d: d5, w: COLS, h: ROWS });
  benchFlush();
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const lh = 14 * devicePixelRatio;
  const ink = (px) => { let t = 0; for (let i = 3; i < px.length; i += 4) t += px[i]; return t; };
  const band = (r) => ink(g.getImageData(0, Math.round(r * lh), canvas.width, Math.round(lh)).data);
  const bottom = (r) => // the band's last 3 device px: where in-box tails/bars live
    ink(g.getImageData(0, Math.round((r + 1) * lh) - 3, canvas.width, 3).data);
  const pass = band(3) === 0 && band(6) === 0 // nothing escapes its box
    && bottom(2) > 0 && bottom(5) > 0; // tails + low bar visible, in-box
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=blink: SGR 5 on the canvas — the off phase hides the glyph ink (bg
// stays), the on phase restores it, driven synchronously through the
// benchBlinkPhase hook (headless timers are unreliable). Green/red convention.
if (MODE === "blink") {
  const d6 = [];
  for (let i = 0; i < ROWS; i++) d6.push([[pad("")]]);
  d6[2] = [[pad("blinking Mgjq")], [[0, 13, { x: 1, g: 4 }]]];
  apply({ d: d6, w: COLS, h: ROWS });
  benchFlush();
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const lh = 17 * devicePixelRatio;
  const band = () => {
    const px = g.getImageData(0, Math.round(2 * lh), canvas.width, Math.round(lh)).data;
    let lit = 0, blue = 0;
    for (let i = 0; i < px.length; i += 4) {
      if (px[i] > 100 && px[i + 1] > 100) lit++; // glyph ink (light gray)
      if (px[i + 2] > 100 && px[i] < 60) blue++; // the bg fill
    }
    return { lit, blue };
  };
  const on = band(); // phase false: ink + bg
  benchBlinkPhase(true);
  const off = band(); // off phase: bg only
  benchBlinkPhase(false);
  const back = band();
  const pass = on.lit > 0 && on.blue > 0
    && off.lit === 0 && off.blue > 0 // ink gone, bg untouched
    && back.lit > 0; // and it comes back
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=freeze: the ghost layer freezes for the WHOLE pointer hold — the
// browser anchors a (collapsed) selection at pointerdown, and a ghost text
// node replaced before the first drag movement orphans it. During the hold
// the ghost node must stay the same object with the same data; releasing the
// pointer lets the next flush resync. Green/red convention.
if (MODE === "freeze") {
  const d7 = [];
  for (let i = 0; i < ROWS; i++) d7.push([[pad(`row ${i} stable text`)]]);
  apply({ d: d7, w: COLS, h: ROWS });
  benchFlush();
  const spin = (ms) => { const t = performance.now(); while (performance.now() - t < ms); };
  const rowEl = document.querySelectorAll("#screen .row")[3];
  const node = rowEl.firstChild;
  const before = node.data;
  document.getElementById("screen").dispatchEvent(
    new PointerEvent("pointerdown", { bubbles: true }));
  spin(50); apply({ r: [[3, 0, pad("CHANGED while held")]] }); benchFlush();
  const heldSame = rowEl.firstChild === node && node.data === before;
  window.dispatchEvent(new PointerEvent("pointerup"));
  spin(50); apply({ r: [[3, 0, pad("changed after release")]] }); benchFlush();
  const releasedFresh = rowEl.firstChild.data.startsWith("changed after release");
  const pass = heldSame && releasedFresh;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=hold: the whole picture freezes while a selection is live — neither
// the canvas pixels nor the ghost text of ANY row may change (what you see,
// what you highlighted, and what Ctrl-C copies are the same thing); clearing
// the selection resyncs both layers in one step. Green/red convention.
if (MODE === "hold") {
  const d8 = [];
  for (let i = 0; i < ROWS; i++) d8.push([[pad(`row ${i} calm text`)]]);
  apply({ d: d8, w: COLS, h: ROWS });
  benchFlush();
  const spin = (ms) => { const t = performance.now(); while (performance.now() - t < ms); };
  const rows = document.querySelectorAll("#screen .row");
  const selNode = rows[3].firstChild;
  const otherNode = rows[5].firstChild; // a row the selection does NOT touch
  const range = document.createRange();
  range.setStart(selNode, 0);
  range.setEnd(selNode, 10); // "row 3 calm"
  const sel = getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const lh = 17 * devicePixelRatio;
  const band5 = () =>
    Array.from(g.getImageData(0, Math.round(5 * lh), canvas.width, Math.round(lh)).data);
  const same = (a, b) => a.length === b.length && a.every((v, i) => v === b[i]);
  const pixBefore = band5();
  const ghostBefore = otherNode.data;
  // a change to a DIFFERENT row: held globally — pixels, ghost, selection all still
  spin(50); apply({ r: [[5, 0, pad("CHANGED under a hold")]] }); benchFlush();
  const heldOk = same(band5(), pixBefore) && otherNode.data === ghostBefore
    && sel.toString() === "row 3 calm";
  // selection cleared: the next flush catches BOTH layers up
  sel.removeAllRanges();
  spin(50); benchFlush();
  const releasedOk = !same(band5(), pixBefore)
    && otherNode.data.startsWith("CHANGED under a hold");
  const pass = heldOk && releasedOk;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=holdfull: a FULL frame (resize/image/reconnect) arriving during a live
// selection must NOT rebuild #screen — that would detach the ghost Text node the
// selection is anchored in. The rebuild is deferred until release, then applied.
// Green/red convention.
if (MODE === "holdfull") {
  const df = [];
  for (let i = 0; i < ROWS; i++) df.push([[pad(`row ${i} calm text`)]]);
  apply({ d: df, w: COLS, h: ROWS });
  benchFlush();
  const spin = (ms) => { const t = performance.now(); while (performance.now() - t < ms); };
  const rows = document.querySelectorAll("#screen .row");
  const selNode = rows[3].firstChild;
  const range = document.createRange();
  range.setStart(selNode, 0);
  range.setEnd(selNode, 10); // "row 3 calm"
  const sel = getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  // A FULL frame under the hold: the rebuild must be deferred, so the very
  // Text node the selection anchors in survives and the selection is intact.
  spin(50);
  const dd = [];
  for (let i = 0; i < ROWS; i++) dd.push([[pad(`ROW ${i} REPLACED WHOLESALE`)]]);
  apply({ d: dd, w: COLS, h: ROWS });
  benchFlush();
  const heldOk = document.querySelectorAll("#screen .row")[3].firstChild === selNode
    && sel.toString() === "row 3 calm";
  // Release: the deferred full now applies (rows rebuilt with the new text).
  sel.removeAllRanges();
  spin(50); benchFlush();
  const after = document.querySelectorAll("#screen .row")[3].firstChild;
  const releasedOk = after !== selNode && after.data.startsWith("ROW 3 REPLACED");
  const pass = heldOk && releasedOk;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

// ?mode=weight: kitty-parity text composition — with the boost ON, every
// antialiased glyph pixel's alpha must equal a + k·a(1−a) for the coverage a
// measured with it OFF (the double-draw's source-over algebra, k from
// weightBoost); solid and empty pixels must be untouched; midtones must move
// heavier (light-on-dark). Green/red convention.
if (MODE === "weight") {
  const d9 = [];
  for (let i = 0; i < ROWS; i++) d9.push([[pad("")]]);
  d9[2] = [[pad("weight probe mille illuminated Willi 0123456789")]];
  apply({ d: d9, w: COLS, h: ROWS });
  benchFlush();
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const lh = 17 * devicePixelRatio;
  const band = () =>
    g.getImageData(0, Math.round(2 * lh), canvas.width, Math.round(lh)).data;
  benchWeight(false);
  const raw = band(); // plain platform coverage in the alpha channel
  benchWeight(true);
  const adj = band();
  // default pair: fg #d0d0d0 (lum ~0.816) on bg #000000, but the filter is
  // built from 1/8-quantized luminances — recompute the same quantized pair
  const k = weightBoost([0xd0, 0xd0, 0xd0], [0, 0, 0]);
  let checked = 0, moved = 0, solidBad = 0;
  const errs = [];
  for (let i = 3; i < raw.length; i += 4) {
    const a = raw[i] / 255;
    const b = adj[i] / 255;
    if (a === 0 || a === 1) {
      if (Math.abs(b - a) > 1 / 255) solidBad++; // solid/empty: untouched ±rounding
      continue;
    }
    checked++;
    const want = a + k * a * (1 - a); // the double-draw's source-over algebra
    errs.push(Math.abs(b - want));
    if (b > a) moved++;
  }
  errs.sort((x, y) => x - y);
  const p95 = errs[Math.floor(errs.length * 0.95)] ?? 1;
  const p50 = errs[Math.floor(errs.length * 0.5)] ?? 1;
  const pass = k > 0.5 && solidBad === 0 && checked > 200 && p50 < 0.01 && p95 < 0.02
    && moved / checked > 0.95;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00"
    : `rgb(${Math.min(255, Math.round(p95 * 1000))}, ${Math.min(255, Math.round(p50 * 1000))}, ${Math.min(255, solidBad)})`;
}

// ?mode=liga: run-shaped text — under a ligature font (JetBrainsMono NF's
// calt: => != === ->), the shaped run must render DIFFERENT glyphs than
// forced per-cell drawing, while keeping the same ink extent (the grid
// guard). Skips green when the font isn't installed. Green/red convention.
if (MODE === "liga") {
  const fam = '"JetBrainsMono Nerd Font"';
  document.getElementById("screen").style.fontFamily = `${fam}, monospace`;
  if (!document.fonts.check(`14px ${fam}`)) {
    document.getElementById("screen").style.display = "none";
    document.body.style.background = "#00ff00"; // not installed: skip
  } else {
    const dl = [];
    for (let i = 0; i < ROWS; i++) dl.push([[pad("")]]);
    dl[2] = [[pad("a => b != c === d -> e")]];
    apply({ d: dl, w: COLS, h: ROWS });
    benchFlush();
    const canvas = document.querySelector("#screen canvas");
    const g = canvas.getContext("2d");
    const lh = 17 * devicePixelRatio;
    const band = () =>
      g.getImageData(0, Math.round(2 * lh), canvas.width, Math.round(lh)).data;
    const shaped = band(); // runs on (default)
    benchRuns(false);
    const percell = band();
    benchRuns(true);
    let diff = 0, inkShaped = 0, inkCell = 0;
    for (let i = 3; i < shaped.length; i += 4) {
      if (shaped[i] > 0) inkShaped++;
      if (percell[i] > 0) inkCell++;
      if (Math.abs(shaped[i] - percell[i]) > 32) diff++;
    }
    // ligatures formed = materially different pixels; similar total ink =
    // the grid guard held (no smeared/shifted run)
    const pass = inkShaped > 400 && diff > 50
      && Math.abs(inkShaped - inkCell) < inkShaped * 0.25;
    document.getElementById("screen").style.display = "none";
    document.body.style.background = pass ? "#00ff00"
      : `rgb(${Math.min(255, diff)}, ${Math.min(255, Math.round(inkShaped / 10))}, ${Math.min(255, Math.round(inkCell / 10))})`;
  }
}

// ?mode=stems (&runs=off to force per-cell): D.3's measurement surface — a
// row of single-stem glyphs for verify.py to derive inter-stem spacing
// statistics from (per-cell rounded x vs run-shaped font advances).
if (MODE === "stems") {
  const ds = [];
  for (let i = 0; i < ROWS; i++) ds.push([[pad("")]]);
  ds[2] = [[pad("l".repeat(50))]];
  apply({ d: ds, w: COLS, h: ROWS });
  benchFlush();
  if (PARAMS.get("runs") === "off") benchRuns(false);
}

// ?mode=pinch: visual-viewport zoom re-rasterization — simulating a 1.5×
// pinch must grow the backing store by 1.5× in each dimension and re-render
// the text at the higher density (more device-pixel ink), and releasing the
// pinch must restore the original store. Green/red convention.
if (MODE === "pinch") {
  const dp = [];
  for (let i = 0; i < ROWS; i++) dp.push([[pad(`row ${i} pinch probe text`)]]);
  apply({ d: dp, w: COLS, h: ROWS });
  benchFlush();
  const canvas = document.querySelector("#screen canvas");
  const g = canvas.getContext("2d");
  const ink = () => {
    const px = g.getImageData(0, 0, canvas.width, canvas.height).data;
    let t = 0;
    for (let i = 3; i < px.length; i += 4) if (px[i] > 0) t++;
    return t;
  };
  const w0 = canvas.width, h0 = canvas.height, ink0 = ink();
  benchPinch(1.5);
  const scaled = Math.abs(canvas.width - Math.round(w0 * 1.5)) <= 2
    && Math.abs(canvas.height - Math.round(h0 * 1.5)) <= 2
    && ink() > ink0 * 1.7; // ~1.5² denser ink, minus AA slack
  benchPinch(1);
  const restored = canvas.width === w0 && canvas.height === h0;
  const pass = scaled && restored;
  document.getElementById("screen").style.display = "none";
  document.body.style.background = pass ? "#00ff00" : "#ff0000";
}

document.title = "verified-ready";
</script></body></html>
