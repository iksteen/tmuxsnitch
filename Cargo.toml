[package]
name = "shellglass"
version = "0.5.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
arc-swap = "1"
argon2 = "0.5"
axum = "0.8.9"
axum-server = { version = "0.8", features = ["tls-rustls"] }
base64 = "0.22.1"
bytes = "1"
clap = { version = "4.6.1", features = ["derive", "env"] }
fontdb = "0.23"
getrandom = "0.3"
libc = "0.2"
portable-pty = "0.9"
reqwest = { version = "0.13", default-features = false, features = ["stream", "rustls"] }
rustls-acme = { version = "0.15", features = ["axum", "tokio"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.52.3", features = ["full"] }
tokio-stream = { version = "0.1.17", features = ["sync"] }
tower-http = { version = "0.7", features = ["compression-br", "compression-gzip"] }
toml = "1.1.2"
vt100 = "0.16.2"

[profile.release]
strip = true
