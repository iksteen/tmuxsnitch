<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shellglass</title>
<!-- Tokens filled at serve time (double-brace style/screen/script): style = terminal
     CSS + @font-face; screen = the live #screen div the renderer fills; script = the
     scripts that boot it. The nav carries a pure-CSS CRT toggle (scanlines, phosphor
     bloom, flicker) — off by default, remembered in localStorage. -->
{{style}}
<style>
:root {
  --bg:#0a0e14; --border:#232c3a;
  --text:#e8edf4; --text-mute:#6b7888;
  --accent:#34d399; --accent-2:#22d3ee; --radius:14px;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
}
/* Full-viewport column: nav, stage (all leftover space), footer stuck to the
   bottom. body height must be DEFINITE (not min-height): a flex container's auto
   height is intrinsic — it counts the stage's content and grows past the viewport
   — while a definite height makes the stage exactly the leftover space, which the
   shrink-to-fit script below sizes the terminal against without feedback. */
body { background:var(--bg); color:var(--text); font-family:var(--sans);
  line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  height:100vh; height:100dvh; display:flex; flex-direction:column; }
a { color:var(--accent-2); text-decoration:none; }
.nav {
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:14px clamp(16px,5vw,40px);
  background:color-mix(in oklab, var(--bg) 78%, transparent);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
}
.brand { display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:-0.01em; }
.brand .grad { background:linear-gradient(100deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text; background-clip:text; color:transparent; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse {
  0%   { box-shadow:0 0 0 0 color-mix(in oklab,var(--accent) 55%,transparent); }
  70%  { box-shadow:0 0 0 7px transparent; }
  100% { box-shadow:0 0 0 0 transparent; }
}
.nav .meta { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; color:var(--text-mute); }
.nav-right { display:flex; align-items:center; gap:16px; }
.toggle { display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none;
  font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; color:var(--text-mute); }
.toggle input { accent-color:var(--accent); margin:0; }
.stage { position:relative; display:flex; justify-content:center; align-items:center;
  flex:1; min-height:0; padding:clamp(14px,2vw,24px) clamp(16px,5vw,40px); }
.glow {
  position:absolute; inset:-10% -20% auto -20%; height:420px; z-index:-1; pointer-events:none;
  filter:blur(8px); opacity:.7;
  background:
    radial-gradient(700px 300px at 22% 0%, color-mix(in oklab,var(--accent) 22%,transparent), transparent 70%),
    radial-gradient(640px 280px at 82% 0%, color-mix(in oklab,var(--accent-2) 18%,transparent), transparent 70%);
}
/* Same height as the nav (padding 14px, ~1-line content), so the stage sits
   symmetrically between the two bars and centering in the stage IS centering
   in the window. */
footer { max-width:1140px; width:100%; margin:0 auto; padding:14px clamp(16px,5vw,40px);
  color:var(--text-mute); font-size:13px; border-top:1px solid var(--border); }

/* ── CRT tube ─────────────────────────────────────────────────────────────
   The panel is styled as a curved glass tube (thick bezel, deep corner
   vignette, rounded glass). Four stacked non-interactive overlay layers give
   the shader: .crt-scan (darkening scanlines, multiply), .crt-grille (RGB
   aperture mask, screen), .crt-bar (bright rolling refresh band), .crt-vig
   (glass sheen + vignette). #screen itself gets phosphor bloom + a chromatic
   fringe. Overlays are pointer-events:none so the text stays selectable.
   The overlays live in .tube WITH the terminal — the fit script zooms the
   tube, so scanlines/grille are phosphor-space: they magnify and pan with the
   content instead of staying glued to the glass at 1 screen pixel. */
.stage { perspective:1600px; }
.tube { position:relative; width:fit-content; }
.panel {
  /* border-box so max-width/height:100% cap the padded box — content-box would
     let the panel's own padding overshoot the stage into the footer.
     overflow:hidden at fit (the fit script switches to auto when zoomed in):
     always-auto is a scrollbar trap — the fit is exact, so a transiently shown
     scrollbar steals the pixels that make the other axis overflow, and the two
     sustain each other. */
  position:relative; box-sizing:border-box; max-width:100%; max-height:100%; overflow:hidden;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  touch-action:none; /* we own touch: one finger pans, two-finger pinch zooms */
  padding:26px 30px; border:none; border-radius:26px / 34px;
  background:#040705;
  box-shadow:
    0 0 0 10px #05070a, 0 0 0 11px #1c2530,   /* bezel */
    0 40px 90px -20px rgba(0,0,0,.9),
    inset 0 0 90px 24px rgba(0,0,0,.95),        /* deep corner vignette */
    inset 0 0 40px rgba(60,255,170,.06);        /* faint phosphor wash */
  filter:saturate(1.25) contrast(1.06);
  transform:rotateX(.6deg);
}
#screen {
  filter:brightness(1.12) contrast(1.08) saturate(1.3);
  text-shadow:
    -1px 0 rgba(255,45,85,.45),
     1px 0 rgba(45,205,255,.45),
     0 0 6px rgba(120,255,180,.6),
     0 0 16px rgba(80,255,160,.35);
}
.crt-scan, .crt-grille, .crt-bar, .crt-vig {
  content:""; position:absolute; inset:0; z-index:5; pointer-events:none; border-radius:inherit;
}
/* Scanlines: darken every other 1px line — the visible interlace. */
.crt-scan {
  background:repeating-linear-gradient(0deg,
    rgba(0,0,0,.55) 0 1px, rgba(0,0,0,0) 1px 3px);
  mix-blend-mode:multiply;
  animation:crt-flicker 90ms steps(2) infinite;
}
/* Aperture grille: vertical R/G/B phosphor stripes, adding light. */
.crt-grille {
  background:repeating-linear-gradient(90deg,
    rgba(255,0,60,.22) 0 1px, rgba(0,255,90,.14) 1px 2px, rgba(60,120,255,.22) 2px 3px);
  mix-blend-mode:screen; opacity:.7;
}
/* Bright refresh band sweeping top→bottom, continuously. Painted as a moving
   background (not a positioned element) so it never extends the panel's scroll. */
.crt-bar {
  background:linear-gradient(180deg,
    rgba(180,255,210,0) 0, rgba(180,255,210,.14) 45%, rgba(120,255,190,.22) 50%,
    rgba(180,255,210,.14) 55%, rgba(180,255,210,0) 100%);
  background-size:100% 26%; background-repeat:no-repeat; mix-blend-mode:screen;
  animation:crt-sweep 5s linear infinite;
}
/* Curved-glass sheen (top-left) over the corner vignette. */
.crt-vig {
  background:
    radial-gradient(120% 90% at 28% 8%, rgba(255,255,255,.06) 0, transparent 42%),
    radial-gradient(140% 140% at 50% 50%, transparent 55%, rgba(0,0,0,.6) 100%);
}
@keyframes crt-sweep { 0% { background-position:0 -30%; } 100% { background-position:0 130%; } }
@keyframes crt-flicker { 0% { opacity:.86; } 100% { opacity:1; } }
@media (prefers-reduced-motion: reduce) {
  .crt-scan, .crt-bar, .dot { animation:none; }
}
/* Header toggle: unchecking "CRT" flattens the tube — hide the overlays and drop
   phosphor bloom, chromatic fringe, glass curve + vignette, leaving plain text.
   Pure CSS via :has(); the checkbox state is persisted to localStorage below. */
body:has(#crt:not(:checked)) .crt-scan,
body:has(#crt:not(:checked)) .crt-grille,
body:has(#crt:not(:checked)) .crt-bar,
body:has(#crt:not(:checked)) .crt-vig { display:none; }
body:has(#crt:not(:checked)) .panel {
  filter:none; transform:none;
  box-shadow:0 40px 90px -20px rgba(0,0,0,.9), 0 0 0 1px var(--border);
}
body:has(#crt:not(:checked)) #screen { filter:none; text-shadow:none; }
/* Hug the terminal so the panel shrink-wraps it, and so the ResizeObserver in the
   fit script below fires on grid width changes too (not just height). */
#screen { width:fit-content; }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand"><span class="dot"></span><span class="grad">shellglass</span></span>
  <span class="nav-right">
    <span class="meta">live terminal mirror</span>
    <label class="toggle"><input type="checkbox" id="crt">CRT</label>
  </span>
</nav>
<script>
// Persist the CRT toggle across reloads. Runs before <main> so the stored state is
// applied before the panel paints (no flash of effects). localStorage is wrapped —
// a viewer with it disabled still gets a working toggle, just not a remembered one.
(() => {
  const c = document.getElementById('crt');
  try { if (localStorage.getItem('shellglass-crt') === 'on') c.checked = true; } catch (e) {}
  c.addEventListener('change', () => {
    try { localStorage.setItem('shellglass-crt', c.checked ? 'on' : 'off'); } catch (e) {}
  });
})();
</script>
<main class="stage">
  <div class="glow"></div>
  <div class="panel">
    <div class="tube">
      {{screen}}
      <div class="crt-grille"></div>
      <div class="crt-scan"></div>
      <div class="crt-bar"></div>
      <div class="crt-vig"></div>
    </div>
  </div>
</main>
<footer>Live over SSE — <a href="https://github.com/iksteen/shellglass">shellglass</a>.</footer>
<script>
// Fit + zoom + pan. The terminal is scaled with CSS `zoom` (it affects layout —
// unlike transform — so the panel tightens around the result): the base factor
// shrinks it to fit the stage between nav and footer (never enlarges), and the
// user factor (pinch / ctrl+wheel, 1..8, anchored at the cursor) magnifies on
// top. Zoomed-in content overflows *inside* the panel (overflow:auto, capped at
// the stage via max-width/height:100%), so the tube never grows past nav or
// footer; panning is native scroll (wheel/trackpad/scrollbars) plus middle-drag —
// left-drag stays free for text selection. Re-fits when the grid resizes
// (#screen is fit-content, so a new frame size moves its box) or the viewport
// does (the stage resizes). Stable: the stage is viewport-driven (flex-basis 0),
// so zooming the tube can't change the space we measure against. The zoom goes
// on .tube (terminal + CRT overlays) so the shader layers scale and pan with
// the content. Runs after <footer> so the first measurement already sees the
// final page layout.
(() => {
  const scr = document.getElementById('screen');
  const tube = document.querySelector('.tube');
  const stage = document.querySelector('.stage');
  const panel = document.querySelector('.panel');
  let fitZ = 1; // shrink-to-fit factor (≤ 1), from the layout
  let userZ = 1; // user magnification (≥ 1), from pinch / ctrl+wheel
  const pads = (el, a, b) => {
    const cs = getComputedStyle(el);
    return parseFloat(cs[a]) + parseFloat(cs[b]);
  };
  const apply = () => {
    tube.style.zoom = fitZ * userZ;
    // Scrollbars only when magnified — at fit the content fits by construction,
    // and overflow:auto there is a scrollbar trap (see the .panel comment).
    panel.style.overflow = userZ > 1 ? 'auto' : 'hidden';
  };
  const fit = () => {
    const box = scr.firstElementChild;
    if (!box) return;
    // Measuring at zoom 1 momentarily shrinks the content, which clamps the
    // panel's scroll position — capture and restore it around the measurement.
    const sl = panel.scrollLeft, st = panel.scrollTop;
    tube.style.zoom = 1;
    const availW = stage.clientWidth - pads(stage, 'paddingLeft', 'paddingRight')
      - pads(panel, 'paddingLeft', 'paddingRight');
    const availH = stage.clientHeight - pads(stage, 'paddingTop', 'paddingBottom')
      - pads(panel, 'paddingTop', 'paddingBottom');
    // Fractional measurement (offsetWidth rounds), and a hair under the exact
    // fit — the panel cap binds exactly, so a sub-pixel overshoot would flash
    // scrollbars. At natural size (no shrink) keep zoom exactly 1 for crispness.
    const b = box.getBoundingClientRect();
    const z = Math.min(availW / b.width, availH / b.height);
    fitZ = z >= 1 ? 1 : z * 0.999;
    apply();
    panel.scrollLeft = sl;
    panel.scrollTop = st;
  };
  const ro = new ResizeObserver(fit);
  ro.observe(stage);
  ro.observe(scr);

  // Multiply the user zoom by `f`, keeping the viewport point (x, y) fixed.
  const zoomAt = (f, x, y) => {
    const prev = userZ;
    userZ = Math.min(8, Math.max(1, userZ * f));
    if (userZ === prev) return;
    const r = userZ / prev;
    const rect = panel.getBoundingClientRect();
    const cx = x - rect.left, cy = y - rect.top;
    apply();
    panel.scrollLeft = (panel.scrollLeft + cx) * r - cx;
    panel.scrollTop = (panel.scrollTop + cy) * r - cy;
  };

  // Desktop zoom: ctrl+wheel (and trackpad pinch, which arrives as it). Plain
  // wheel falls through to native scrolling (that's the pan). Firefox mouse
  // wheels report line deltas (deltaMode 1) — normalize to ~pixels.
  panel.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault(); // keep the browser's own page zoom out of it
    const dy = e.deltaY * (e.deltaMode === 1 ? 33 : 1);
    zoomAt(Math.pow(2, -dy / 400), e.clientX, e.clientY);
  }, { passive: false });

  // Touch (touch-action:none claims these from the browser, so a pinch on the
  // terminal zooms IT, not the page): one finger pans, two fingers pinch-zoom
  // at their midpoint (which also pans as the midpoint moves). Mouse pan stays
  // on middle-drag so left-drag keeps selecting text.
  // ponytail: touch pan has no fling/momentum — native scrolling is gone with
  // touch-action:none; add velocity-decay on pointerup if it feels dead.
  const touches = new Map(); // active touch points, pointerId → position
  let drag = null; // one-finger / middle-button pan state
  let pinch = null; // previous two-finger distance + midpoint
  const startDrag = (x, y) => {
    drag = { x, y, l: panel.scrollLeft, t: panel.scrollTop };
  };
  panel.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'touch') {
      touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
      try { panel.setPointerCapture(e.pointerId); } catch (err) {}
      pinch = null;
      if (touches.size === 1) startDrag(e.clientX, e.clientY);
      else drag = null; // second finger: switch from pan to pinch
      return;
    }
    if (e.button !== 1) return;
    e.preventDefault(); // suppress middle-click autoscroll/paste-position
    startDrag(e.clientX, e.clientY);
    try { panel.setPointerCapture(e.pointerId); } catch (err) {}
  });
  panel.addEventListener('pointermove', (e) => {
    if (e.pointerType === 'touch' && touches.has(e.pointerId)) {
      touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (touches.size >= 2) {
        const [a, b] = [...touches.values()];
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (pinch && pinch.dist > 0) {
          zoomAt(dist / pinch.dist, mx, my);
          panel.scrollLeft -= mx - pinch.mx; // midpoint movement pans too
          panel.scrollTop -= my - pinch.my;
        }
        pinch = { dist, mx, my };
        return;
      }
    }
    if (!drag) return;
    panel.scrollLeft = drag.l - (e.clientX - drag.x);
    panel.scrollTop = drag.t - (e.clientY - drag.y);
  });
  const endPointer = (e) => {
    touches.delete(e.pointerId);
    pinch = null;
    drag = null;
    if (touches.size === 1) {
      // Pinch ended with one finger still down — continue as a pan from there.
      const [p] = touches.values();
      startDrag(p.x, p.y);
    }
  };
  panel.addEventListener('pointerup', endPointer);
  panel.addEventListener('pointercancel', endPointer);

  // iOS Safari's proprietary pinch pipeline can still fire page zoom from a
  // gesture starting on the panel — cut it off explicitly.
  for (const t of ['gesturestart', 'gesturechange']) {
    panel.addEventListener(t, (e) => e.preventDefault());
  }
})();
</script>
{{script}}
</body>
</html>
