<!doctype html>
<!-- shellglass embed page (`?embed`): no chrome — just the terminal, scaled to
     fill the frame it was given. This is what an <iframe> (or the
     <shellglass-view> element from /embed.js) shows. Same three tokens as any
     viewer template: {{style}} {{screen}} {{script}}. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shellglass</title>
{{style}}
<style>
html, body { height:100%; }
body { display:flex; align-items:center; justify-content:center;
       overflow:hidden; background:#000; }
#screen { width:fit-content; }
/* The fit scales #screen with `transform: scale` (paint-time — see the fit script).
   The canvas mounts in #sg-canvas-host, OUTSIDE that transform, so WebKit
   composites it at device resolution instead of resampling a transformed layer
   (soft glyphs in Safari). The host mirrors the SCALED dimensions (layout can't
   see the transform) so flex centering has a box to center; #screen keeps only
   the transparent, selectable ghost rows. Origin 0 0 so the scaled ghost rows
   land at the host's top-left, exactly under the canvas. */
#sg-canvas-host { position:relative; }
#screen { transform-origin:0 0; }
/* Offline takeover: viewer.ts publishes body[data-offline="hub"|"operator"]
   (absent = live) — a frozen embed should say so, not just stand still. */
.sg-offline { position:fixed; inset:0; display:none; align-items:center;
  justify-content:center; background:rgba(0,0,0,.72); color:#d0d0d0;
  font:600 13px/1.4 system-ui,sans-serif; letter-spacing:.18em;
  text-transform:uppercase; }
body[data-offline] .sg-offline { display:flex; }
.sg-offline span { display:none; }
body[data-offline="hub"] .off-hub { display:inline; }
body[data-offline="operator"] .off-op { display:inline; }
</style>
</head>
<body>
<div id="sg-canvas-host">{{screen}}</div>
<div class="sg-offline" aria-hidden="true"><span class="off-hub">offline</span><span class="off-op">operator offline</span></div>
{{script}}
<script>
// Fit the terminal to the frame with `transform: scale`, growing as well as
// shrinking — an embed fills the box the host page gave it. Paint-time on
// purpose: mobile WebKit's text autosizer boosts text CSS `zoom` makes tiny
// (ignoring text-size-adjust), warping the box — a transform it never sees.
// Layout keeps the natural box, but flex centering + the default center
// origin + overflow:hidden mean the scaled picture lands centered anyway.
// The canvas re-rasterizes on "sg-zoom" (see watchZoom in the viewer), so
// scaled text stays crisp. Re-fits when the grid resizes (a new frame size
// moves #screen's box) or the frame does.
(() => {
  const host = document.getElementById('sg-canvas-host');
  const scr = document.getElementById('screen');
  const fit = () => {
    const box = scr.firstElementChild;
    if (!box) return;
    scr.style.transform = 'none'; // measure the natural (unscaled) grid box
    const b = box.getBoundingClientRect();
    if (!b.width || !b.height) return;
    // a hair under the exact fit so sub-pixel rounding can't overflow the box
    const z = Math.min(innerWidth / b.width, innerHeight / b.height) * 0.999;
    scr.style.transform = 'scale(' + z + ')';
    // transform is invisible to layout, so mirror the scaled size onto the
    // non-transformed host — the flex-centered box AND the canvas's 100% frame.
    host.style.width = b.width * z + 'px';
    host.style.height = b.height * z + 'px';
    window.dispatchEvent(new Event('sg-zoom'));
  };
  new ResizeObserver(fit).observe(scr);
  addEventListener('resize', fit);
})();
</script>
</body>
</html>
